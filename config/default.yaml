# Configuration par défaut — Projet P2 Recommandation basée sur le contenu
# Modifier selon vos chemins et jeux de données.

# Chemins relatifs à la racine du projet
paths:
  data_dir: "data"
  raw_data: "data/raw"
  processed_data: "data/processed"
  models_dir: "models"
  results_dir: "results"

# Paramètres du recommandeur (exemples à adapter)
recommender:
  similarity_metric: "cosine"  # cosine | euclidean | jaccard
  top_k: 10
  min_similarity: 0.0

# Évaluation
evaluation:
  metrics:
    - "precision"
    - "recall"
    - "ndcg"
  at_k: [5, 10, 20]

# Optionnel : utiliser le GPU si disponible
device: "auto"  # auto | cpu | cuda
